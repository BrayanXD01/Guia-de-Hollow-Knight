<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecánicas Básicas: Hollow Knight</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background-image: url('fondo.png'); 
            background-size: cover;      
            background-attachment: scroll; 
            background-position: center; 
            color: white; 
        }

        /* Botón de volver fijo en la esquina superior izquierda */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: rgba(26, 26, 26, 0.9);
            border: 1px solid #ffd700;
            color: #ffd700;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            z-index: 1000;
            transition: background 0.3s;
        }

        .back-button:hover {
            background-color: #ffd700;
            color: black;
        }
        
        .navbar { 
            width: 100%; 
            padding: 40px 0; 
            display: flex;
            justify-content: center; 
        }
        
        .logo-img {
            width: 80%;      
            max-width: 800px; 
            height: auto;     
            display: block;
        }
        
        .hero { text-align: center; padding: 20px 20px 60px 20px; }
        h1 { font-size: 3rem; margin: 10px 0; }
        p { color: #e0e0e0; font-size: 1.1rem; margin-bottom: 40px; }

        .guia-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 400px)); 
            gap: 25px; 
            padding: 20px 40px; 
            justify-content: center; 
            max-width: 1000px; 
            margin: 0 auto; 
            margin-bottom: 50px;
        }
        
        .card-link { text-decoration: none; color: inherit; }
        
        .card { 
            background: rgba(26, 26, 26, 0.8); 
            padding: 30px; 
            border-radius: 24px; 
            text-align: center; 
            border: 1px solid #444; 
            transition: transform 0.2s; 
        }
        
        .card:hover { transform: translateY(-5px); border-color: #ffd700; }

    .video-fondo {
     position: fixed;
     top: 0;
     left: 0;
     width: 100%;  
     height: 100%;
     object-fit: cover;
     z-index: -1;
    
     transform: scale(1.2);
     transform-origin: center;
    }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
    <source src="video/fondo.mp4" type="video/mp4">
    </video>

    <!-- Botón fijo de navegación -->
    <a href="index.html" class="back-button">← Inicio</a>

    <header class="navbar">
        <img src="imagenes/hollow logo.png" alt="Logo de Hollow Knight" class="logo-img">
    </header>

    <main>
        <div class="hero">
            <h1>Mecánicas Básicas</h1>
            <p>Domina lo mas basico de este hermoso juego.</p>
        </div>

        <div class="guia-grid">
            <!-- Apartado: El Aguijón -->
            <a href="aguijon.html" class="card-link">
                <div class="card">
                    <img src="imagenes/aguijon.png" alt="El Aguijón" style="width: 150px; height: auto; margin-bottom: 20px;">
                    <h3>El Aguijón</h3>
                    <p>Aprende los movimientos básicos, cómo mejorar tu aguijon y como usar las artes de los aguijones.</p>
                </div>
            </a>

            <!-- Apartado: El Alma -->
            <a href="alma.html" class="card-link">
                <div class="card">
                    <img src="imagenes/alma.png" alt="El Alma" style="width: 150px; height: auto; margin-bottom: 20px;">
                    <h3>El Alma</h3>
                    <p>aprende como usar tu alma, tanto para curarte, como atacar a tus enemigos.</p>
                </div>
            </a>
        </div>
    </main>

</body>
</html>
